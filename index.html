<script>
/* =========================================
   MODEL DATABASE (SAFE VERSION)
========================================= */
const MODELS = [
    { id: "glm-4.5-flash", name: "GLM-4.5-Flash", provider: "ZhipuAI", type: "free", think: false, desc: "Default engine" },
    { id: "gemini-2.0-flash", name: "Gemini Flash", provider: "Google", type: "free", think: false, desc: "Fast responses" },
    { id: "deepseek-r1", name: "DeepSeek R1", provider: "DeepSeek", type: "pro", think: true, desc: "Reasoning model" }
];

/* ADD EXTRA MODELS SAFELY */
for (let i = 0; i < 20; i++) {
    MODELS.push({
        id: "omni-" + i,
        name: "Omni Engine " + i,
        provider: (i % 2 === 0) ? "Google" : "Groq",
        type: "pro",
        think: (i % 4 === 0),
        desc: "Extended module"
    });
}

/* =========================================
   STATE
========================================= */
let state = {
    authMode: 'master',
    selectedModel: MODELS[0],
    tokens: JSON.parse(localStorage.getItem('nx_tokens') || '[]'),
    masterKey: localStorage.getItem('nx_master_key') || '',
    masterPass: 'admin123',
    isThinkActive: false,
    directives: localStorage.getItem('nx_directives') || ""
};

/* =========================================
   AUTH
========================================= */
function setAuthMode(mode) {
    state.authMode = mode;

    document.getElementById('tab-master').classList.toggle('active', mode === 'master');
    document.getElementById('tab-player').classList.toggle('active', mode === 'player');

    document.getElementById('auth-label').innerText =
        mode === 'master' ? 'MASTER SECURITY KEY' : 'PLAYER SESSION TOKEN';
}

function handleAuth() {
    const input = document.getElementById('auth-input').value;

    if (state.authMode === 'master') {
        if (input === state.masterPass) {
            localStorage.setItem('nx_session', 'master');
            showScreen('owner-screen');
            showToast("MASTER ACCESS");
        } else {
            showToast("WRONG PASSWORD", true);
        }
    } else {
        if (state.tokens.includes(input)) {
            localStorage.setItem('nx_session', 'player');
            showScreen('chat-screen');
            syncModelUI();
            showToast("PLAYER LOGIN");
        } else {
            showToast("INVALID TOKEN", true);
        }
    }
}

function logout() {
    localStorage.removeItem('nx_session');
    location.reload();
}

/* =========================================
   SCREEN
========================================= */
function showScreen(id) {
    const screens = document.querySelectorAll('.screen');
    screens.forEach(s => s.classList.remove('active'));

    const target = document.getElementById(id);
    if (target) target.classList.add('active');
}

/* =========================================
   PANELS
========================================= */
function switchPanel(panelId, btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');

    document.querySelectorAll('.workspace-panel').forEach(p => p.classList.remove('active'));

    const panel = document.getElementById('panel-' + panelId);
    if (panel) {
        panel.classList.add('active');
        panel.style.display = (panelId === 'omnichat') ? 'flex' : 'block';
    }

    if (panelId === 'omnichat') syncModelUI();
}

/* =========================================
   MODELS
========================================= */
function renderModels() {
    const container = document.getElementById('model-container');
    if (!container) return;

    let html = "";
    MODELS.forEach(m => {
        html += `
        <div class="model-card ${state.selectedModel.id === m.id ? 'selected' : ''}"
             onclick="selectModel('${m.id}')">
            <p>${m.provider}</p>
            <h4>${m.name}</h4>
            <div style="font-size:10px;color:var(--text-dim)">${m.desc}</div>
        </div>`;
    });

    container.innerHTML = html;
}

function selectModel(id) {
    const found = MODELS.find(m => m.id === id);
    if (!found) return;

    state.selectedModel = found;
    renderModels();
    syncModelUI();
    showToast("MODEL: " + found.name);
}

/* =========================================
   TOKENS
========================================= */
function genToken() {
    const token = "NX-" + Math.random().toString(36).substr(2, 8).toUpperCase();
    state.tokens.push(token);
    localStorage.setItem('nx_tokens', JSON.stringify(state.tokens));
    renderTokens();
}

function renderTokens() {
    const list = document.getElementById('token-list');
    if (!list) return;

    let html = "";
    state.tokens.forEach(t => {
        html += `
        <div class="glass-panel" style="padding:10px;display:flex;justify-content:space-between;">
            <code>${t}</code>
            <button onclick="copyToken('${t}')">COPY</button>
        </div>`;
    });

    list.innerHTML = html;
}

function copyToken(t) {
    navigator.clipboard.writeText(t);
    showToast("COPIED");
}

/* =========================================
   MODEL SYNC
========================================= */
function syncModelUI() {
    const nameEl = document.getElementById('active-model-name');
    if (nameEl) nameEl.innerText = state.selectedModel.name;

    document.querySelectorAll('.think-btn-global').forEach(btn => {
        btn.style.display = state.selectedModel.think ? 'flex' : 'none';
        btn.classList.toggle('active', state.isThinkActive);
    });

    if (!state.selectedModel.think) state.isThinkActive = false;
}

function toggleThink() {
    if (!state.selectedModel.think) return;

    state.isThinkActive = !state.isThinkActive;

    document.querySelectorAll('.think-btn-global')
        .forEach(btn => btn.classList.toggle('active', state.isThinkActive));
}

/* =========================================
   CHAT
========================================= */
function appendMsg(containerId, role, text) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const row = document.createElement('div');
    row.className = "msg-row " + role;

    const bubble = document.createElement('div');
    bubble.className = "bubble";
    bubble.innerText = text;

    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
}

function addThinking(containerId) {
    const container = document.getElementById(containerId);
    if (!container) return null;

    const id = "th-" + Date.now();

    const row = document.createElement('div');
    row.className = "msg-row ai";
    row.id = id;

    row.innerHTML = `<div class="bubble thinking-bubble">Processing...</div>`;
    container.appendChild(row);

    return id;
}

function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
}

function sendPlayerChat() {
    const input = document.getElementById('player-chat-input');
    if (!input) return;

    const msg = input.value.trim();
    if (!msg) return;

    appendMsg('player-chat-display', 'user', msg);
    input.value = "";

    if (state.isThinkActive && state.selectedModel.think) {
        const id = addThinking('player-chat-display');

        setTimeout(() => {
            removeThinking(id);
            appendMsg('player-chat-display', 'ai',
                "[" + state.selectedModel.name + "] analyzed: " + msg);
        }, 2000);
    } else {
        setTimeout(() => {
            appendMsg('player-chat-display', 'ai',
                "[" + state.selectedModel.name + "] " + msg);
        }, 500);
    }
}

function sendOwnerChat() {
    const input = document.getElementById('owner-chat-input');
    if (!input) return;

    const msg = input.value.trim();
    if (!msg) return;

    appendMsg('owner-chat-display', 'user', msg);
    input.value = "";

    setTimeout(() => {
        appendMsg('owner-chat-display', 'ai',
            "Master → " + state.selectedModel.name + ": " + msg);
    }, 500);
}

/* =========================================
   SETTINGS
========================================= */
function saveGlobalKey() {
    const el = document.getElementById('global-api-key');
    if (!el) return;

    state.masterKey = el.value;
    localStorage.setItem('nx_master_key', state.masterKey);
    showToast("KEY SAVED");
}

function saveDirectives() {
    const el = document.getElementById('sys-prompt-area');
    if (!el) return;

    state.directives = el.value;
    localStorage.setItem('nx_directives', state.directives);
    showToast("SAVED");
}

/* =========================================
   TOAST
========================================= */
function showToast(msg, err=false) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;

    if (err) t.style.borderColor = 'var(--status-danger)';

    document.body.appendChild(t);

    requestAnimationFrame(() => t.classList.add('show'));

    setTimeout(() => {
        t.classList.remove('show');
        setTimeout(() => t.remove(), 400);
    }, 2500);
}

/* =========================================
   INIT
========================================= */
window.onload = function() {
    renderModels();
    renderTokens();

    const keyInput = document.getElementById('global-api-key');
    if (keyInput) keyInput.value = state.masterKey;

    const session = localStorage.getItem('nx_session');

    if (session === 'master') {
        showScreen('owner-screen');
    } else if (session === 'player') {
        showScreen('chat-screen');
        syncModelUI();
    }
};

/* ENTER TO SEND */
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        const active = document.activeElement;

        if (active && active.tagName === 'TEXTAREA') {
            e.preventDefault();

            if (active.id.includes('player')) sendPlayerChat();
            if (active.id.includes('owner')) sendOwnerChat();
        }
    }
});
</script>

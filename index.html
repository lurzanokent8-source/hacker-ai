<script>
const MODELS = [
    { id: "glm-4.5-flash", name: "GLM-4.5-Flash", provider: "ZhipuAI", type: "free", think: false, desc: "Nexus Default — Majestic performance." },
    { id: "gemini-2.0-flash", name: "Gemini 2.0 Flash", provider: "Google", type: "free", think: false, desc: "Ultra-low latency reasoning." },
    { id: "deepseek-r1", name: "DeepSeek R1", provider: "DeepSeek", type: "pro", think: true, desc: "Chain-of-thought logic." },
    ...[...Array(20)].map((_, i) => ({
        id: `omni-${i}`,
        name: `Omni Engine ${i}`,
        provider: "Custom",
        type: "pro",
        think: i % 3 === 0,
        desc: "Extended module"
    }))
];

let state = {
    authMode: 'master',
    selectedModel: MODELS[0],
    tokens: JSON.parse(localStorage.getItem('nx_tokens') || '[]'),
    masterKey: localStorage.getItem('nx_master_key') || '',
    masterPass: 'admin123',
    isThinkActive: false
};

/* ======================
   SAFE TEXT RENDER
====================== */
function escapeHTML(str) {
    return str.replace(/[&<>"']/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;',
        '"': '&quot;', "'": '&#39;'
    }[tag]));
}

/* ======================
   AUTH
====================== */
function setAuthMode(m) {
    state.authMode = m;
    tab-master.classList.toggle('active', m === 'master');
    tab-player.classList.toggle('active', m === 'player');
    auth-label.innerText = m === 'master' ? 'MASTER SECURITY KEY' : 'PLAYER TOKEN';
}

function handleAuth() {
    const val = auth-input.value;

    if(state.authMode === 'master' && val === state.masterPass){
        localStorage.setItem('nx_session','master');
        showScreen('owner-screen');
        showToast("MASTER ACCESS");
    } 
    else if(state.authMode === 'player' && state.tokens.includes(val)){
        localStorage.setItem('nx_session','player');
        showScreen('chat-screen');
        syncModelUI();
    } 
    else showToast("ACCESS DENIED", true);
}

/* ======================
   SCREEN
====================== */
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* ======================
   MODELS
====================== */
function renderModels(){
    model-container.innerHTML = MODELS.map(m => `
        <div class="model-card ${state.selectedModel.id===m.id?'selected':''}" onclick="selectModel('${m.id}')">
            <p>${m.provider}</p>
            <h4>${m.name}</h4>
            <div style="font-size:10px;color:var(--text-dim)">${m.desc}</div>
        </div>
    `).join('');
}

function selectModel(id){
    state.selectedModel = MODELS.find(m=>m.id===id);
    renderModels();
    syncModelUI();
}

/* ======================
   TOKENS
====================== */
function genToken(){
    const t = "NX-" + Math.random().toString(36).slice(2,10).toUpperCase();
    state.tokens.push(t);
    localStorage.setItem('nx_tokens', JSON.stringify(state.tokens));
    renderTokens();
}

function renderTokens(){
    token-list.innerHTML = state.tokens.map(t => `
        <div class="glass-panel" style="padding:10px;display:flex;justify-content:space-between;">
            <code>${t}</code>
            <button onclick="copy('${t}')">COPY</button>
        </div>
    `).join('');
}

/* ======================
   CHAT
====================== */
function appendMsg(containerId, role, text){
    const c = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className = `msg-row ${role}`;
    div.innerHTML = `<div class="bubble">${escapeHTML(text)}</div>`;
    c.appendChild(div);
    c.scrollTop = c.scrollHeight;
}

function fakeTyping(containerId, text){
    let i=0;
    const c = document.getElementById(containerId);
    const div = document.createElement('div');
    div.className="msg-row ai";
    const bubble = document.createElement('div');
    bubble.className="bubble";
    div.appendChild(bubble);
    c.appendChild(div);

    const interval = setInterval(()=>{
        bubble.innerHTML = escapeHTML(text.slice(0,i++));
        c.scrollTop = c.scrollHeight;
        if(i>text.length) clearInterval(interval);
    }, 15);
}

function sendPlayerChat(){
    const msg = player-chat-input.value.trim();
    if(!msg) return;

    appendMsg('player-chat-display','user',msg);
    player-chat-input.value='';

    setTimeout(()=>{
        fakeTyping('player-chat-display', `Response from ${state.selectedModel.name}: ${msg}`);
    },500);
}

/* ======================
   UX BOOST
====================== */
document.querySelectorAll('textarea').forEach(t=>{
    t.addEventListener('keydown', e=>{
        if(e.key==='Enter' && !e.shiftKey){
            e.preventDefault();
            sendPlayerChat();
        }
    });
});

/* ======================
   TOAST FIX
====================== */
function showToast(msg, err=false){
    const t=document.createElement('div');
    t.className='toast';
    t.innerText=msg;
    if(err) t.style.borderColor='red';
    document.body.appendChild(t);

    requestAnimationFrame(()=>t.classList.add('show'));

    setTimeout(()=>{
        t.classList.remove('show');
        setTimeout(()=>t.remove(),400);
    },2500);
}

/* ======================
   INIT
====================== */
window.onload = ()=>{
    renderModels();
    renderTokens();
};
</script>
